<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapTap Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #ff3c3c;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --green: #00ff88;
    --team-best: #00d4ff;
    --team-worst: #ff6b35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,60,60,0.12) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px);
  }

  .container { max-width: 960px; margin: 0 auto; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 0.04em; color: var(--text); line-height: 1; }
  .logo span { color: var(--accent); }
  .subtitle { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 0.25rem; }

  .header-right { display: flex; align-items: center; gap: 0.75rem; }

  .status-pill { display: flex; align-items: center; gap: 0.4rem; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 0.35rem 0.75rem; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.error { background: var(--accent); }

  .refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 0.4rem 0.9rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning { opacity: 0.5; pointer-events: none; }

  .last-updated { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); text-align: right; margin-bottom: 2rem; margin-top: -1.5rem; }

  .section-title { font-family: 'DM Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 0.75rem; }

  /* ── STANDINGS CARDS ── */
  .leaderboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 2.5rem; }

  .player-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1rem 1rem; position: relative; overflow: hidden; transition: transform 0.2s, border-color 0.2s; }
  .player-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .player-card.rank-1 { border-color: var(--gold); }
  .player-card.rank-1::before, .round-card.rank-1::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

  .rank-badge { position: absolute; top: 0.75rem; right: 0.75rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; line-height: 1; opacity: 0.15; }
  .rank-1 .rank-badge { color: var(--gold); opacity: 0.5; }
  .rank-2 .rank-badge { color: var(--silver); opacity: 0.4; }
  .rank-3 .rank-badge { color: var(--bronze); opacity: 0.4; }

  .player-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
  .player-stats { display: flex; flex-direction: column; gap: 0.2rem; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; font-family: 'DM Mono', monospace; font-size: 0.75rem; }
  .stat-label { color: var(--muted); }
  .stat-value { font-weight: 500; font-size: 0.85rem; }
  .stat-value.big { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); line-height: 1; display: block; margin: 0.25rem 0; }

  /* ── ROUND STATS ── */
  .round-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 2.5rem; }

  .round-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1rem; transition: transform 0.2s, border-color 0.2s; }
  .round-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .round-card.rank-1 { border-color: var(--gold); }
  .round-card-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.75rem; }

  .round-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; }
  .round-label { color: var(--muted); width: 2rem; flex-shrink: 0; }
  .round-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .round-bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.6s ease; }
  .round-val { color: var(--text); width: 2.5rem; text-align: right; flex-shrink: 0; }
  .perfect-count { margin-left: auto; color: var(--gold); font-size: 0.68rem; }

  /* ── TABLE ── */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 2.5rem; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead tr { background: rgba(255,60,60,0.06); border-bottom: 1px solid var(--border); }
  th { padding: 0.75rem 1rem; text-align: left; font-family: 'DM Mono', monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 500; }
  th:not(:first-child):not(:nth-child(2)) { text-align: center; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td { padding: 0.55rem 1rem; font-family: 'DM Mono', monospace; font-size: 0.78rem; }
  td:not(:first-child):not(:nth-child(2)) { text-align: center; }

  .date-cell { color: var(--muted); font-size: 0.72rem; white-space: nowrap; }
  .day-label { display: inline-block; background: rgba(255,60,60,0.12); color: var(--accent); border-radius: 4px; padding: 0.1rem 0.35rem; font-size: 0.62rem; font-weight: 500; letter-spacing: 0.05em; margin-right: 0.3rem; }
  .player-cell { font-weight: 600; font-size: 0.8rem; }

  .score-win { color: var(--green); font-weight: 600; }
  .score-win::after { content: ' 👑'; font-size: 0.65rem; }
  .score-miss { color: var(--muted); }
  .score-perfect { color: var(--gold); font-weight: 700; }

  .rounds-mini { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.02em; }

  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; height: 1rem; display: block; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ── TEAM PERFORMANCE ── */
  .team-section {
    margin-bottom: 2.5rem;
  }

  .team-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  @media (max-width: 560px) {
    .team-grid { grid-template-columns: 1fr; }
  }

  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .team-card:hover { transform: translateY(-2px); }

  .team-card-header {
    padding: 0.85rem 1rem 0.65rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .team-card-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .team-card.best { border-color: rgba(0,212,255,0.35); }
  .team-card.best .team-card-header { background: rgba(0,212,255,0.06); }
  .team-card.best::before { content: ''; display: block; height: 2px; background: linear-gradient(90deg, transparent, var(--team-best), transparent); }

  .team-card.worst { border-color: rgba(255,107,53,0.35); }
  .team-card.worst .team-card-header { background: rgba(255,107,53,0.06); }
  .team-card.worst::before { content: ''; display: block; height: 2px; background: linear-gradient(90deg, transparent, var(--team-worst), transparent); }

  .team-avg-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    line-height: 1;
  }
  .team-card.best .team-avg-score { color: var(--team-best); }
  .team-card.worst .team-avg-score { color: var(--team-worst); }

  .team-threshold-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.64rem;
    padding: 0.2rem 0.5rem;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .team-card.best .team-threshold-badge {
    background: rgba(0,212,255,0.12);
    color: var(--team-best);
    border: 1px solid rgba(0,212,255,0.25);
  }
  .team-card.worst .team-threshold-badge {
    background: rgba(255,107,53,0.12);
    color: var(--team-worst);
    border: 1px solid rgba(255,107,53,0.25);
  }

  .team-card-body { padding: 0.9rem 1rem; }

  .team-date-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .team-scores {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .team-score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
  }

  .team-score-player { color: var(--text); font-weight: 600; }
  .team-score-val { font-weight: 500; }
  .team-card.best .team-score-val { color: var(--team-best); }
  .team-card.worst .team-score-val { color: var(--team-worst); }
  .team-score-miss { color: var(--muted); }

  /* ── GOOD DAYS SUMMARY ── */
  .good-days-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .good-days-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--team-best);
    line-height: 1;
  }

  .good-days-label { color: var(--muted); }

  .good-days-pct {
    margin-left: auto;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--team-best);
    border-radius: 6px;
    padding: 0.2rem 0.5rem;
    font-size: 0.68rem;
  }

  /* ── NESTED ACCORDION ── */
  .acc-year { margin-bottom: 0.75rem; }

  .acc-year-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1.1rem; cursor: pointer; user-select: none;
    background: rgba(255,60,60,0.06); border: 1px solid var(--border);
    border-radius: 12px; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 0.05em; color: var(--text);
    transition: border-color 0.2s;
  }
  .acc-year-header:hover { border-color: var(--accent); }
  .acc-year.open .acc-year-header { border-radius: 12px 12px 0 0; border-bottom-color: transparent; }

  .acc-year-body { display: none; border: 1px solid var(--border); border-top: none; border-radius: 0 0 12px 12px; padding: 0.75rem; background: var(--bg); }
  .acc-year.open .acc-year-body { display: block; }

  .acc-month { margin-bottom: 0.5rem; }
  .acc-month:last-child { margin-bottom: 0; }

  .acc-month-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 0.9rem; cursor: pointer; user-select: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; font-family: 'DM Mono', monospace;
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); transition: border-color 0.2s, color 0.2s;
  }
  .acc-month-header:hover { border-color: var(--accent); color: var(--text); }
  .acc-month.open .acc-month-header { border-radius: 8px 8px 0 0; border-bottom-color: transparent; color: var(--text); }

  .acc-month-body { display: none; border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
  .acc-month.open .acc-month-body { display: block; }

  .acc-chevron { font-size: 0.6rem; color: var(--muted); transition: transform 0.25s; flex-shrink: 0; }
  .acc-year.open .acc-year-header .acc-chevron,
  .acc-month.open .acc-month-header .acc-chevron { transform: rotate(180deg); }

  .acc-item { background: var(--surface); border-bottom: 1px solid var(--border); overflow: hidden; transition: background 0.15s; }
  .acc-item:last-child { border-bottom: none; }
  .acc-item:hover { background: rgba(255,255,255,0.02); }

  .acc-header { display: flex; align-items: center; justify-content: space-between; padding: 0.7rem 1rem; cursor: pointer; user-select: none; gap: 1rem; }
  .acc-header-left { display: flex; align-items: center; gap: 0.75rem; }
  .acc-header-right { display: flex; align-items: center; gap: 0.75rem; }

  .acc-winner { display: flex; align-items: center; gap: 0.4rem; font-family: 'DM Mono', monospace; font-size: 0.78rem; }
  .acc-winner-name { color: var(--green); font-weight: 600; }
  .acc-winner-score { color: var(--green); font-weight: 700; }

  .acc-body { display: none; border-top: 1px solid var(--border); }
  .acc-item.open .acc-body { display: block; }
  .acc-item.open .acc-header .acc-chevron { transform: rotate(180deg); }
  .acc-table th {
    padding: 0.55rem 1rem; text-align: left;
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); font-weight: 500;
    background: rgba(255,60,60,0.04);
    border-bottom: 1px solid var(--border);
  }
  .acc-table th:not(:first-child) { text-align: center; }
  .acc-table td { padding: 0.55rem 1rem; font-family: 'DM Mono', monospace; font-size: 0.78rem; border-bottom: 1px solid var(--border); }
  .acc-table td:not(:first-child) { text-align: center; }
  .acc-table tr:last-child td { border-bottom: none; }

  .empty { text-align: center; padding: 2rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; }

  .fired-up-badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    font-weight: 600; letter-spacing: 0.06em;
    background: rgba(255, 160, 0, 0.12);
    border: 1px solid rgba(255, 160, 0, 0.35);
    color: #ffaa00;
    border-radius: 20px; padding: 0.18rem 0.55rem;
    white-space: nowrap;
  }

  .tabs { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
  .tab { font-family: 'DM Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid var(--border); color: var(--muted); cursor: pointer; background: transparent; transition: all 0.2s; }
  .tab.active { background: rgba(255,60,60,0.1); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="logo">MAP<span>TAP</span></div>
      <div class="subtitle">Group Leaderboard · 2026</div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" onclick="loadData(true)" id="refreshBtn">↻ Refresh</button>
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Loading…</span>
      </div>
    </div>
  </header>

  <div class="last-updated" id="lastUpdated"></div>

  <!-- STANDINGS -->
  <div class="section-title">🏆 Standings by Points</div>
  <div class="leaderboard" id="leaderboardPoints">
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
  </div>

  <div class="section-title" style="margin-top:0.5rem">👑 Standings by Daily Wins</div>
  <div class="leaderboard" id="leaderboardWins">
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
  </div>

  <!-- ROUND STATS -->
  <div class="section-title" style="margin-top:0.5rem">📊 Averages</div>
  <div class="round-stats-grid" id="roundAvgs"></div>

  <div class="section-title" style="margin-top:0.5rem">🎯 Perfect 100s</div>
  <div class="round-stats-grid" id="roundPerfects"></div>

  <div class="section-title" style="margin-top:0.5rem">🌟 Best Day</div>
  <div class="leaderboard" id="bestDay"></div>

  <div class="section-title" style="margin-top:0.5rem">📉 Worst Day</div>
  <div class="leaderboard" id="worstDay"></div>

  <!-- TEAM PERFORMANCE -->
  <div class="section-title" style="margin-top:0.5rem">🤝 Team Performance</div>
  <div class="team-section" id="teamPerformance"></div>

  <!-- DAILY TABLE -->
  <div class="section-title">📅 Results by Date</div>
  <div id="accordion"></div>

</div>

<script>
// ═══════════════════════════════════════════
const SHEET_ID   = '1YOh6ah35-qDKM3p5CnT7jbeyMIY637-WDXF0_xVPKE4';
const SHEET_NAME = 'Sheet1';
const TEAM_GOOD_DAY_THRESHOLD = 900; // individual score out of 1000
// ═══════════════════════════════════════════

const PLAYERS = ['Jura', 'Adam', 'Berta', 'Andrew'];
const AUTO_REFRESH_MS = 60000;
let allRows = [];

// ── HELPERS ─────────────────────────────────
function hasScore(s) { return s !== null && s !== undefined && s !== '' && !isNaN(Number(s)) && Number(s) > 0; }
function n(s) { return Number(s); }

function getDayOfWeek(dateStr) {
  const [d, m, y] = dateStr.split('/').map(Number);
  const fullYear = y < 100 ? 2000 + y : y;
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(fullYear, m - 1, d).getDay()];
}

function setStatus(state, text) {
  document.getElementById('statusDot').className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = text;
}

function avg(arr) {
  const valid = arr.filter(x => hasScore(x)).map(n);
  return valid.length ? (valid.reduce((a,b) => a+b, 0) / valid.length) : null;
}

// ── FETCH ────────────────────────────────────
async function fetchSheetData() {
  const cacheBust = Date.now();
  const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(SHEET_NAME)}&cb=${cacheBust}`;
  const proxies = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  ];

  let lastErr;
  for (const makeProxy of proxies) {
    try {
      const res = await fetch(makeProxy(csvUrl), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = res.headers.get('content-type')?.includes('json')
        ? (await res.json()).contents
        : await res.text();
      if (!text || text.includes('<!DOCTYPE')) throw new Error('Sheet not public');
      return parseCSV(text);
    } catch(e) { lastErr = e; console.warn('Proxy failed:', e.message); }
  }
  throw lastErr;
}

// ── PARSE CSV ────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < l.length; i++) {
      if (l[i] === '"') { inQ = !inQ; }
      else if (l[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += l[i]; }
    }
    cols.push(cur.trim());
    return cols;
  });

  return lines.slice(1)
    .filter(r => r[0] && r[1])
    .map(r => ({
      date:   r[0],
      player: r[1],
      rounds: [r[2], r[3], r[4], r[5], r[6]].map(v => (v && v !== '') ? Number(v) : null),
      final:  (r[7] && r[7] !== '') ? Number(r[7]) : null,
    }))
    .sort((a, b) => {
      const pa = a.date.split('/').reverse().join('');
      const pb = b.date.split('/').reverse().join('');
      return pb.localeCompare(pa) || a.player.localeCompare(b.player);
    });
}

// ── COMPUTE TEAM STATS ───────────────────────
function computeTeamStats(rows) {
  const allDates = [...new Set(rows.map(r => r.date))];

  // For each date, compute the average final across all players who played
  const dayAverages = allDates
    .map(date => {
      const dayRows = rows.filter(r => r.date === date && hasScore(r.final));
      if (!dayRows.length) return null;
      const teamAvg = dayRows.reduce((s, r) => s + r.final, 0) / dayRows.length;
      return { date, teamAvg: Math.round(teamAvg * 10) / 10, rows: dayRows, playerCount: dayRows.length };
    })
    .filter(Boolean);

  if (!dayAverages.length) return null;

  // Best & worst team days
  const bestTeamDay  = dayAverages.reduce((best, d) => d.teamAvg > best.teamAvg ? d : best);
  const worstTeamDay = dayAverages.reduce((worst, d) => d.teamAvg < worst.teamAvg ? d : worst);

  // Days at or above threshold (avg, kept for worst-day rough count)
  const goodDays = dayAverages.filter(d => d.teamAvg >= TEAM_GOOD_DAY_THRESHOLD);

  // Days where all 4 players each individually scored 900+
  const allHitDays = allDates
    .map(date => {
      const dayRows = rows.filter(r => r.date === date && hasScore(r.final));
      if (dayRows.length < PLAYERS.length) return null; // not everyone played
      const allHit = dayRows.every(r => r.final >= TEAM_GOOD_DAY_THRESHOLD);
      return allHit ? date : null;
    })
    .filter(Boolean);

  // Days where all 4 players each individually scored less than 900
  const allMissedDays = allDates
    .map(date => {
      const dayRows = rows.filter(r => r.date === date && hasScore(r.final));
      if (dayRows.length < PLAYERS.length) return null;
      const allMissed = dayRows.every(r => r.final < TEAM_GOOD_DAY_THRESHOLD);
      return allMissed ? date : null;
    })
    .filter(Boolean);

  return { bestTeamDay, worstTeamDay, goodDays, allHitDays, allMissedDays, totalDays: dayAverages.length };
}

// ── RENDER TEAM PERFORMANCE ──────────────────
function renderTeamPerformance(rows) {
  const el = document.getElementById('teamPerformance');
  const stats = computeTeamStats(rows);

  if (!stats) {
    el.innerHTML = '<div class="empty">No team data yet.</div>';
    return [];
  }

  const { bestTeamDay, worstTeamDay, goodDays, allHitDays, allMissedDays, totalDays } = stats;
  const goodDayPct = totalDays > 0 ? Math.round((goodDays.length / totalDays) * 100) : 0;

  function scoreRows(day, cardType) {
    return PLAYERS.map(p => {
      const pr = day.rows.find(r => r.player === p);
      if (!pr) return `<div class="team-score-row"><span class="team-score-player">${p}</span><span class="team-score-miss">—</span></div>`;
      return `<div class="team-score-row"><span class="team-score-player">${p}</span><span class="team-score-val">${pr.final}</span></div>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="team-grid">
      <div class="team-card best">
        <div class="team-card-header">
          <span class="team-card-title">🌤 Best team day</span>

        </div>
        <div class="team-card-body">
          <div class="team-avg-score">${Math.round(bestTeamDay.teamAvg)}</div>
          <div class="team-date-row">
            <span class="day-label">${getDayOfWeek(bestTeamDay.date)}</span>
            <span>${bestTeamDay.date}</span>
            <span style="margin-left:auto;font-size:0.65rem">team avg</span>
          </div>
          <div class="team-scores">${scoreRows(bestTeamDay, 'best')}</div>
          <div class="good-days-row">
            <span class="good-days-count">${allHitDays.length}</span>
            <span class="good-days-label">day${allHitDays.length !== 1 ? 's' : ''} all 4 scored 900+</span>
          </div>
        </div>
      </div>

      <div class="team-card worst">
        <div class="team-card-header">
          <span class="team-card-title">⛈ Worst team day</span>
          <span class="team-threshold-badge">not all 4 hit 900 = rough day</span>
        </div>
        <div class="team-card-body">
          <div class="team-avg-score">${Math.round(worstTeamDay.teamAvg)}</div>
          <div class="team-date-row">
            <span class="day-label">${getDayOfWeek(worstTeamDay.date)}</span>
            <span>${worstTeamDay.date}</span>
            <span style="margin-left:auto;font-size:0.65rem">team avg</span>
          </div>
          <div class="team-scores">${scoreRows(worstTeamDay, 'worst')}</div>
          <div class="good-days-row" style="border-top-color:var(--border)">
            <span class="good-days-count" style="color:var(--team-worst)">${allMissedDays.length}</span>
            <span class="good-days-label">day${allMissedDays.length !== 1 ? 's' : ''} all 4 scored under 900</span>
          </div>

  return allHitDays;
}

// ── COMPUTE STATS ────────────────────────────
function computeStats(rows) {
  return PLAYERS.map(player => {
    const pRows = rows.filter(r => r.player === player && hasScore(r.final));

    const totalFinal = pRows.reduce((s, r) => s + r.final, 0);
    const gamesPlayed = pRows.length;

    const dates = [...new Set(rows.map(r => r.date))];
    let wins = 0;
    dates.forEach(date => {
      const day = rows.filter(r => r.date === date && hasScore(r.final));
      if (!day.length) return;
      const max = Math.max(...day.map(r => r.final));
      if (day.find(r => r.player === player && r.final === max)) wins++;
    });

    const roundAvgs = [0,1,2,3,4].map(i => {
      const vals = pRows.map(r => r.rounds[i]).filter(v => hasScore(v));
      return vals.length ? Math.round(vals.reduce((a,b) => a+b,0) / vals.length) : null;
    });

    const perfectCounts = [0,1,2,3,4].map(i =>
      pRows.filter(r => r.rounds[i] === 100).length
    );
    const totalPerfects = perfectCounts.reduce((a,b) => a+b, 0);

    const worstDay = pRows.length ? pRows.reduce((min, r) => r.final < min.final ? r : min) : null;
    const bestDay  = pRows.length ? pRows.reduce((max, r) => r.final > max.final ? r : max) : null;

    return { player, totalFinal, gamesPlayed, wins, roundAvgs, perfectCounts, totalPerfects, worstDay, bestDay };
  });
}

// ── RENDER ───────────────────────────────────
function render(rows) {
  const stats = computeStats(rows);

  const byPoints = [...stats].sort((a,b) => b.totalFinal - a.totalFinal);
  const byWins   = [...stats].sort((a,b) => b.wins - a.wins || b.totalFinal - a.totalFinal);

  function renderCards(ranked, key) {
    return ranked.map((p, rank) => {
      const medal = ['🥇','🥈','🥉',''][rank];
      const big   = key === 'wins' ? p.wins : p.totalFinal.toLocaleString();
      const label = key === 'wins' ? 'Daily wins' : 'Total pts';
      const winRate = p.gamesPlayed > 0 ? Math.round((p.wins / p.gamesPlayed) * 100) : 0;
      return `<div class="player-card rank-${rank+1}">
        <div class="rank-badge">${rank+1}</div>
        <div class="player-name">${medal} ${p.player}</div>
        <div class="player-stats">
          <span class="stat-value big">${big}</span>
          <div class="stat-row"><span class="stat-label">${label}</span></div>
          <div class="stat-row" style="margin-top:0.3rem">
            <span class="stat-label">Games played</span>
            <span class="stat-value">${p.gamesPlayed}</span>
          </div>
          ${key === 'wins' ? `<div class="stat-row">
            <span class="stat-label">Win rate</span>
            <span class="stat-value">${winRate}%</span>
          </div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('leaderboardPoints').innerHTML = renderCards(byPoints, 'points');
  document.getElementById('leaderboardWins').innerHTML   = renderCards(byWins,   'wins');

  const maxAvg = 100;
  const byAvg = [...stats].sort((a, b) => {
    const avgA = a.gamesPlayed ? a.totalFinal / a.gamesPlayed : 0;
    const avgB = b.gamesPlayed ? b.totalFinal / b.gamesPlayed : 0;
    return avgB - avgA;
  });
  document.getElementById('roundAvgs').innerHTML = byAvg.map((p, rank) => {
    const medal = ['🥇','🥈','🥉',''][rank];
    const hasRoundData = p.roundAvgs.some(v => v !== null);
    const overallAvg = p.gamesPlayed ? Math.round(p.totalFinal / p.gamesPlayed) : null;

    const roundRows = hasRoundData
      ? [0,1,2,3,4].map(i => {
          const val = p.roundAvgs[i];
          const pct = val ? Math.round((val / maxAvg) * 100) : 0;
          return `<div class="round-row">
            <span class="round-label">R${i+1}</span>
            <div class="round-bar-wrap"><div class="round-bar" style="width:${pct}%"></div></div>
            <span class="round-val">${val !== null ? val : '—'}</span>
          </div>`;
        }).join('')
      : '<div style="color:var(--muted);font-family:\'DM Mono\',monospace;font-size:0.72rem">No round data yet</div>';

    return `<div class="round-card rank-${rank+1}" style="position:relative;overflow:hidden;">
      <div class="rank-badge">${rank+1}</div>
      <div class="round-card-name">${medal} ${p.player}</div>
      ${overallAvg !== null ? `
        <div class="stat-row" style="margin-bottom:0.25rem"><span class="stat-label">Total point average</span></div>
        <span class="stat-value big">${overallAvg}</span>
        <div class="stat-row" style="margin-bottom:0.5rem;margin-top:0.5rem"><span class="stat-label">Round point average</span></div>
      ` : ''}
      ${roundRows}
    </div>`;
  }).join('');

  const byPerfects = [...stats].sort((a,b) => b.totalPerfects - a.totalPerfects);
  document.getElementById('roundPerfects').innerHTML = byPerfects.map((p, rank) => {
    const medal = ['🥇','🥈','🥉',''][rank];
    return `<div class="player-card rank-${rank+1}">
      <div class="rank-badge">${rank+1}</div>
      <div class="player-name">${medal} ${p.player}</div>
      <div class="player-stats">
        <span class="stat-value big" style="color:var(--accent)">${p.totalPerfects}</span>
        ${p.perfectCounts.map((count, i) => `
        <div class="stat-row">
          <span class="stat-label">Round ${i+1}</span>
          <span class="stat-value">${count > 0 ? `×${count} 🎯` : '—'}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  const byBestDay = [...stats]
    .filter(p => p.bestDay !== null)
    .sort((a, b) => b.bestDay.final - a.bestDay.final);
  document.getElementById('bestDay').innerHTML = byBestDay.map((p, rank) => {
    const medals = ['🥇','🥈','🥉',''];
    return `<div class="player-card rank-${rank+1}">
      <div class="rank-badge">${rank+1}</div>
      <div class="player-name">${medals[rank]} ${p.player}</div>
      <div class="player-stats">
        <span class="stat-value big" style="color:var(--green)">${p.bestDay.final}</span>
        <div class="stat-row"><span class="stat-label">Best final score</span></div>
        <div class="stat-row" style="margin-top:0.3rem">
          <span class="stat-label">Date</span>
          <span class="stat-value">${p.bestDay.date}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  const byWorstDay = [...stats]
    .filter(p => p.worstDay !== null)
    .sort((a, b) => a.worstDay.final - b.worstDay.final);
  document.getElementById('worstDay').innerHTML = byWorstDay.map((p, rank) => {
    const medals = ['🤦','😬','😅','🙃'];
    return `<div class="player-card rank-${rank+1}">
      <div class="rank-badge">${rank+1}</div>
      <div class="player-name">${medals[rank]} ${p.player}</div>
      <div class="player-stats">
        <span class="stat-value big" style="color:var(--accent)">${p.worstDay.final}</span>
        <div class="stat-row"><span class="stat-label">Worst final score</span></div>
        <div class="stat-row" style="margin-top:0.3rem">
          <span class="stat-label">Date</span>
          <span class="stat-value">${p.worstDay.date}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Team performance
  const allHitDays = renderTeamPerformance(rows);

  allRows = rows;
  renderAccordion(rows, allHitDays);
}

function renderAccordion(rows, allHitDays = []) {
  const accordion = document.getElementById('accordion');
  accordion.className = 'accordion';
  if (!rows.length) { accordion.innerHTML = '<div class="empty">No data yet.</div>'; return; }

  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const dateWinners = {}, dateWinnerNames = {};
  const allDates = [...new Set(rows.map(r => r.date))];
  allDates.forEach(date => {
    const day = rows.filter(r => r.date === date && hasScore(r.final));
    if (!day.length) return;
    const max = Math.max(...day.map(r => r.final));
    dateWinners[date] = max;
    dateWinnerNames[date] = day.find(r => r.final === max)?.player;
  });

  const tree = {};
  rows.forEach(r => {
    const [d, m, y] = r.date.split('/');
    const year = `20${y}`, month = m;
    if (!tree[year]) tree[year] = {};
    if (!tree[year][month]) tree[year][month] = new Set();
    tree[year][month].add(r.date);
  });

  const years = Object.keys(tree).sort((a,b) => b - a);
  const mostRecentYear = years[0];
  const mostRecentMonth = Object.keys(tree[mostRecentYear]).sort().pop();

  accordion.innerHTML = years.map(year => {
    const months = Object.keys(tree[year]).sort((a,b) => b - a);
    const isYearOpen = year === mostRecentYear;

    const monthsHTML = months.map(month => {
      const isMonthOpen = year === mostRecentYear && month === mostRecentMonth;
      const dates = [...tree[year][month]].sort((a,b) => {
        const pa = a.split('/').reverse().join('');
        const pb = b.split('/').reverse().join('');
        return pb.localeCompare(pa);
      });

      const daysHTML = dates.map((date, di) => {
        const dayRows = rows.filter(r => r.date === date);
        const winnerName = dateWinnerNames[date];
        const winnerScore = dateWinners[date];

        const playerRows = dayRows.map(r => {
          const isWinner = hasScore(r.final) && r.final === dateWinners[r.date];
          const finalCell = !hasScore(r.final) ? `<td class="score-miss">—</td>`
            : isWinner ? `<td class="score-win">${r.final}</td>`
            : `<td>${r.final}</td>`;
          const roundCells = r.rounds.map(v =>
            v === 100 ? `<td class="score-perfect">100</td>`
            : hasScore(v) ? `<td>${v}</td>`
            : `<td class="score-miss">—</td>`
          ).join('');
          return `<tr>
            <td class="player-cell">${isWinner ? '🥇 ' : ''}${r.player}</td>
            ${roundCells}${finalCell}
          </tr>`;
        }).join('');

        const isFiredUp = allHitDays.includes(date);
        const perfectCount = dayRows.reduce((sum, r) => sum + r.rounds.filter(v => v === 100).length, 0);

        return `<div class="acc-item" onclick="this.classList.toggle('open')">
          <div class="acc-header">
            <div class="acc-header-left">
              <span class="date-cell"><span class="day-label">${getDayOfWeek(date)}</span>${date}</span>
              ${isFiredUp ? `<span class="fired-up-badge">🔥 All scored +900</span>` : ''}
              ${perfectCount > 0 ? `<span class="fired-up-badge" style="background:rgba(255,215,0,0.1);border-color:rgba(255,215,0,0.3);color:var(--gold)">💯×${perfectCount}</span>` : ''}
            </div>
            <div class="acc-header-right">
              ${winnerName ? `<span class="acc-winner">
                <span class="acc-winner-name">🥇 ${winnerName}</span>
                <span class="acc-winner-score">${winnerScore}</span>
              </span>` : ''}
              <span class="acc-chevron">▼</span>
            </div>
          </div>
          <div class="acc-body">
            <table class="acc-table">
              <thead><tr>
                <th>Player</th>
                <th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>R5</th>
                <th>Final</th>
              </tr></thead>
              <tbody>${playerRows}</tbody>
            </table>
          </div>
        </div>`;
      }).join('');

      return `<div class="acc-month${isMonthOpen ? ' open' : ''}">
        <div class="acc-month-header" onclick="this.parentElement.classList.toggle('open')">
          <span>${MONTH_NAMES[parseInt(month)-1]} · ${dates.length} day${dates.length > 1 ? 's' : ''}</span>
          <span class="acc-chevron">▼</span>
        </div>
        <div class="acc-month-body">${daysHTML}</div>
      </div>`;
    }).join('');

    return `<div class="acc-year${isYearOpen ? ' open' : ''}">
      <div class="acc-year-header" onclick="this.parentElement.classList.toggle('open')">
        <span>${year}</span>
        <span class="acc-chevron">▼</span>
      </div>
      <div class="acc-year-body">${monthsHTML}</div>
    </div>`;
  }).join('');
}

// ── LOAD ─────────────────────────────────────
async function loadData(manual = false) {
  const btn = document.getElementById('refreshBtn');
  if (manual) btn.classList.add('spinning');
  setStatus('', 'Syncing…');
  try {
    const data = await fetchSheetData();
    render(data);
    setStatus('live', 'Live');
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      `Last synced: ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
  } catch(err) {
    console.error(err);
    setStatus('error', 'Error loading data');
    document.getElementById('lastUpdated').textContent = `Error: ${err.message}. Open DevTools (F12) → Console for details.`;
  } finally {
    btn.classList.remove('spinning');
  }
}

loadData();
setInterval(() => loadData(), AUTO_REFRESH_MS);
