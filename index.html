<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapTap Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #ff3c3c;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --green: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
    background-image: 
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,60,60,0.12) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px);
  }

  .container { max-width: 860px; margin: 0 auto; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1;
  }
  .logo span { color: var(--accent); }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 0.25rem;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.35rem 0.75rem;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.error { background: var(--accent); }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .leaderboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0.75rem;
    margin-bottom: 2.5rem;
  }

  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1rem 1rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .player-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .player-card.rank-1 { border-color: var(--gold); }
  .player-card.rank-1::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .rank-badge {
    position: absolute;
    top: 0.75rem; right: 0.75rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    line-height: 1;
    opacity: 0.15;
  }
  .rank-1 .rank-badge { color: var(--gold); opacity: 0.5; }
  .rank-2 .rank-badge { color: var(--silver); opacity: 0.4; }
  .rank-3 .rank-badge { color: var(--bronze); opacity: 0.4; }

  .player-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: 0.02em; }
  .player-stats { display: flex; flex-direction: column; gap: 0.2rem; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
  }

  .stat-label { color: var(--muted); }
  .stat-value { font-weight: 500; font-size: 0.85rem; }
  .stat-value.big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
    display: block;
    margin: 0.25rem 0;
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2.5rem;
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead tr { background: rgba(255,60,60,0.06); border-bottom: 1px solid var(--border); }

  th {
    padding: 0.75rem 1rem;
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 500;
  }
  th:not(:first-child) { text-align: center; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td { padding: 0.65rem 1rem; font-family: 'DM Mono', monospace; font-size: 0.8rem; }
  td:not(:first-child) { text-align: center; }

  .date-cell { color: var(--muted); font-size: 0.75rem; white-space: nowrap; }
  .day-label {
    display: inline-block;
    background: rgba(255,60,60,0.12);
    color: var(--accent);
    border-radius: 4px;
    padding: 0.1rem 0.35rem;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-right: 0.3rem;
  }

  .score-win { color: var(--green); font-weight: 600; }
  .score-win::after { content: ' 👑'; font-size: 0.65rem; }
  .score-miss { color: var(--muted); font-size: 0.7rem; }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
    height: 1rem;
    display: block;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    margin-bottom: 2rem;
    margin-top: -1.5rem;
  }

  .empty { text-align: center; padding: 2rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 0.4rem 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="logo">MAP<span>TAP</span></div>
      <div class="subtitle">Group Leaderboard · 2026</div>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <button class="refresh-btn" onclick="loadData(true)" id="refreshBtn">↻ Refresh</button>
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Loading…</span>
      </div>
    </div>
  </header>

  <div class="last-updated" id="lastUpdated"></div>

  <div class="section-title">🏆 Standings by Points</div>
  <div class="leaderboard" id="leaderboardPoints">
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
  </div>

  <div class="section-title" style="margin-top:1.5rem">👑 Standings by Daily Wins</div>
  <div class="leaderboard" id="leaderboardWins">
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
    <div class="player-card"><span class="skeleton" style="width:60%;margin-bottom:0.75rem"></span><span class="skeleton" style="width:40%;height:2rem"></span></div>
  </div>

  <div class="section-title">📅 Points by Date</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Jura</th>
          <th>Adam</th>
          <th>Berta</th>
          <th>Andrew</th>
        </tr>
      </thead>
      <tbody id="dailyBody">
        <tr><td colspan="5" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════
// !! REPLACE THIS WITH YOUR GOOGLE SHEET ID !!
const SHEET_ID = '1YOh6ah35-qDKM3p5CnT7jbeyMIY637-WDXF0_xVPKE4';
const SHEET_NAME = 'Sheet1'; // change if your tab is named differently
// ═══════════════════════════════════════════════

const PLAYERS = ['Jura', 'Adam', 'Berta', 'Andrew'];
const AUTO_REFRESH_MS = 60000; // auto-refresh every 60s

function played(s) {
  return s !== null && s !== undefined && s !== '' && Number(s) > 0;
}

function getDayOfWeek(dateStr) {
  const [d, m, y] = dateStr.split('/');
  const date = new Date(`20${y}-${m}-${d}`);
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
}

function setStatus(state, text) {
  document.getElementById('statusDot').className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = text;
}

async function fetchSheetData() {
  const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
  
  // Try multiple CORS proxies in order
  const proxies = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  ];

  let lastErr;
  for (const makeProxy of proxies) {
    try {
      const res = await fetch(makeProxy(csvUrl), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = res.headers.get('content-type')?.includes('json')
        ? (await res.json()).contents
        : await res.text();
      if (!text || text.includes('<!DOCTYPE')) throw new Error('Got HTML — sheet may not be published');
      return parseCSV(text);
    } catch (e) {
      lastErr = e;
      console.warn('Proxy failed, trying next...', e.message);
    }
  }
  throw lastErr;
}

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => {
    // Handle quoted CSV fields properly
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < l.length; i++) {
      if (l[i] === '"') { inQ = !inQ; }
      else if (l[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += l[i]; }
    }
    cols.push(cur.trim());
    return cols;
  });

  return lines.slice(1)       // skip header
    .filter(r => r[0])        // skip empty rows
    .map(r => ({
      date: r[0],
      scores: [1,2,3,4].map(i => (r[i] && r[i] !== '') ? Number(r[i]) : null)
    }))
    .sort((a, b) => {
      const pa = a.date.split('/').reverse().join('');
      const pb = b.date.split('/').reverse().join('');
      return pb.localeCompare(pa);
    });
}

function getTotals(results) {
  return PLAYERS.map((_, pi) => {
    let total = 0, wins = 0, gamesPlayed = 0;

    results.forEach(r => {
      if (played(r.scores[pi])) {
        total += Number(r.scores[pi]);
        gamesPlayed++;
      }
    });

    results.forEach(r => {
      const todayPlayed = r.scores
        .map((s, i) => ({ i, s: Number(s) }))
        .filter(x => played(x.s));
      if (!todayPlayed.length) return;
      const max = Math.max(...todayPlayed.map(x => x.s));
      if (played(r.scores[pi]) && Number(r.scores[pi]) === max) wins++;
    });

    return { total, wins, gamesPlayed };
  });
}

function render(results) {
  const totals = getTotals(results);

  const rankedByPoints = PLAYERS.map((p, i) => ({ name: p, idx: i, ...totals[i] }))
    .sort((a, b) => b.total - a.total);

  const rankedByWins = PLAYERS.map((p, i) => ({ name: p, idx: i, ...totals[i] }))
    .sort((a, b) => b.wins - a.wins || b.total - a.total);

  function renderCards(ranked, highlightKey) {
    return ranked.map((p, rank) => {
      const medal = rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : '';
      const bigValue = highlightKey === 'wins' ? p.wins : p.total.toLocaleString();
      const bigLabel = highlightKey === 'wins' ? 'Daily wins' : 'Total pts';
      return `
      <div class="player-card rank-${rank+1}">
        <div class="rank-badge">${rank+1}</div>
        <div class="player-name">${medal} ${p.name}</div>
        <div class="player-stats">
          <span class="stat-value big">${bigValue}</span>
          <div class="stat-row"><span class="stat-label">${bigLabel}</span></div>
          <div class="stat-row" style="margin-top:0.3rem">
            <span class="stat-label">Games played</span>
            <span class="stat-value">${p.gamesPlayed}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('leaderboardPoints').innerHTML = renderCards(rankedByPoints, 'points');
  document.getElementById('leaderboardWins').innerHTML = renderCards(rankedByWins, 'wins');

  const tbody = document.getElementById('dailyBody');
  if (!results.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No data yet.</td></tr>';
    return;
  }

  tbody.innerHTML = results.map(r => {
    const todayPlayed = r.scores.map((s, i) => ({ i, s: Number(s) })).filter(x => played(x.s));
    const max = todayPlayed.length ? Math.max(...todayPlayed.map(x => x.s)) : -1;

    const cells = r.scores.map(s => {
      if (!played(s)) return `<td class="score-miss">—</td>`;
      return Number(s) === max
        ? `<td class="score-win">${s}</td>`
        : `<td>${s}</td>`;
    }).join('');

    return `<tr>
      <td class="date-cell"><span class="day-label">${getDayOfWeek(r.date)}</span>${r.date}</td>
      ${cells}
    </tr>`;
  }).join('');
}

async function loadData(manual = false) {
  const btn = document.getElementById('refreshBtn');
  if (manual) btn.classList.add('spinning');
  setStatus('', 'Syncing…');

  try {
    const data = await fetchSheetData();
    render(data);
    setStatus('live', 'Live');
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      `Last synced: ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
  } catch (err) {
    console.error(err);
    setStatus('error', 'Error loading data');
    document.getElementById('lastUpdated').textContent =
      `Error: ${err.message}. Open DevTools (F12) → Console for details.`;
  } finally {
    btn.classList.remove('spinning');
  }
}

loadData();
setInterval(() => loadData(), AUTO_REFRESH_MS);
</script>
</body>
</html>
